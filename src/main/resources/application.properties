quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:/data/testdb;AUTO_SERVER=TRUE
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.sql-load-script=no-file
quarkus.http.port=8080

# Optional PVC/Allure sync settings
testresult.server.base-url=
testresult.pvc.allure-root=/allure
testresult.pvc.summary-relative-path=widgets/summary.json
